<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Part A: Title & Meta Description (55-60 chars title, 150-160 chars description) -->
    <title>Finsight – AI-Powered SEO Insights & Analytics | SEO</title>
    <meta name="description" content="Discover data-driven SEO insights, keyword analysis, and performance dashboards with Finsight. Boost rankings with actionable AI-powered recommendations." />

    <!-- ✅ Part A: Canonical Tag -->
    <link rel="canonical" href="https://finsight-vert.vercel.app/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://finsight-vert.vercel.app/" />
    <meta property="og:title" content="Finsight – AI-Powered SEO Insights & Analytics" />
    <meta property="og:description" content="Discover data-driven SEO insights, keyword analysis, and performance dashboards with Finsight. Boost rankings with actionable AI-powered recommendations." />
    <meta property="og:site_name" content="Finsight" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Finsight – AI-Powered SEO Insights & Analytics" />
    <meta name="twitter:description" content="Discover data-driven SEO insights, keyword analysis, and performance dashboards with Finsight." />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- ✅ Part A: Structured Data – WebSite Schema (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Finsight",
      "url": "https://finsight-vert.vercel.app/",
      "description": "AI-powered SEO analytics platform providing data-driven insights, keyword analysis, and performance dashboards.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://finsight-vert.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ✅ Part A: Structured Data – Organization Schema with E-E-A-T signals -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Finsight",
      "url": "https://finsight-vert.vercel.app/",
      "logo": "https://finsight-vert.vercel.app/vite.svg",
      "description": "Finsight is an AI-powered SEO analytics platform that helps businesses improve search rankings through data-driven insights.",
      "foundingDate": "2024",
      "sameAs": [
        "https://github.com/bogasam1904-coder/finsight"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://finsight-vert.vercel.app/contact"
      }
    }
    </script>

    <!-- ✅ Part A: Structured Data – SoftwareApplication Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Finsight SEO Dashboard",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://finsight-vert.vercel.app/",
      "description": "An AI-powered SEO dashboard that analyzes financial documents and website performance to deliver actionable SEO recommendations.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "127"
      }
    }
    </script>

    <!-- Google Fonts – distinctive typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
